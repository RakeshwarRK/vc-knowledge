name: Update VC Memory

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 06:00 UTC
  workflow_dispatch:      # Manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout vc-knowledge
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest VirtualClient activity and update memory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request
          import urllib.parse
          import json
          import os
          import datetime

          TOKEN = os.environ.get("GH_TOKEN", "")
          REPO = "microsoft/VirtualClient"
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          def gh_get(path):
              url = f"https://api.github.com/{path}"
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          # Fetch latest 50 commits
          commits = gh_get(f"repos/{REPO}/commits?per_page=50")
          
          # Fetch latest 50 PRs (closed/merged)
          prs = gh_get(f"repos/{REPO}/pulls?state=closed&per_page=50&sort=updated")
          merged_prs = [p for p in prs if p.get("merged_at")]

          today = datetime.date.today().isoformat()

          lines = [
              f"# VC Memory — Recent Activity",
              f"",
              f"*Auto-updated weekly by GitHub Actions. Last scan: {today}*",
              f"",
              f"## Recent Commits (last 50)",
              f"",
              f"| SHA | Date | Author | Summary |",
              f"|-----|------|--------|---------|",
          ]

          for c in commits:
              sha = c["sha"][:8]
              date = c["commit"]["author"]["date"][:10]
              author = c["commit"]["author"]["name"]
              msg = c["commit"]["message"].split("\n")[0][:90]
              # Bold Rakesh's commits
              author_fmt = f"**{author}**" if "rakesh" in author.lower() or "rakeshwarRK" in author.lower() else author
              lines.append(f"| {sha} | {date} | {author_fmt} | {msg} |")

          lines += [
              f"",
              f"## Recently Merged PRs (last 50)",
              f"",
              f"| # | Merged | Author | Title |",
              f"|---|--------|--------|-------|",
          ]

          for p in merged_prs[:50]:
              num = p["number"]
              merged = (p.get("merged_at") or "")[:10]
              author = p["user"]["login"]
              title = p["title"][:80]
              author_fmt = f"**{author}**" if "rakesh" in author.lower() else author
              lines.append(f"| #{num} | {merged} | {author_fmt} | {title} |")

          # Get current version from VERSION file
          try:
              version_data = gh_get(f"repos/{REPO}/contents/VERSION")
              import base64
              version = base64.b64decode(version_data["content"]).decode().strip()
              lines += ["", f"## Current Version", f"", f"- **{version}**"]
          except Exception:
              pass

          content = "\n".join(lines) + "\n"
          with open("memory/recent-activity.md", "w") as f:
              f.write(content)

          print(f"Updated recent-activity.md with {len(commits)} commits and {len(merged_prs)} PRs")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "vc-knowledge-bot"
          git config user.email "vc-knowledge-bot@users.noreply.github.com"
          git add memory/recent-activity.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: update recent-activity.md [$(date -u +%Y-%m-%d)]"
            git push
          fi
